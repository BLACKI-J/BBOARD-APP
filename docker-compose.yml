version: '3.8'

services:
  app:
    build: .
    container_name: bboard-frontend
    network_mode: host
    restart: always

  server:
    build: ./server
    container_name: bboard-backend
    network_mode: host
    volumes:
      - ./server/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
    restart: always

  # Optionnel: Tunnel Cloudflare Zero Trust
  # Remplissez la variable TUNNEL_TOKEN dans un fichier .env à la racine
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bboard-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    profiles:
      - cloudflare

