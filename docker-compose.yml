version: '3.8'

services:
  app:
    build: .
    container_name: bboard-frontend
    network_mode: host
    restart: always

  server:
    build: ./server
    container_name: bboard-backend
    network_mode: host
    volumes:
      - ./server/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
    restart: always

